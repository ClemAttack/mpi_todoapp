name: CI/CD — Build & Deploy

on:
  push:
    branches:
      - main
      - staging
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ─────────────────────────────────────────────────────────────────
  # JOB unique — Build, Push & Deploy (self-hosted runner)
  # Le runner tourne sur ton reseau interne, il a acces au serveur
  # ─────────────────────────────────────────────────────────────────
  build-and-deploy:
    name: Build, Push & Deploy
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=short
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max

      # ── Deploy local (le runner est sur le meme reseau) ──────────
      - name: Deploy
        if: github.ref == 'refs/heads/main'
        run: |
          set -e
          cd /opt/monapp

          # Pull la nouvelle image
          docker compose -f docker-compose.prod.yml pull

          # Redemarre le container
          docker compose -f docker-compose.prod.yml up -d --remove-orphans

          # Nettoie les anciennes images
          docker image prune -f

          echo "Deploy OK — $(date)"
